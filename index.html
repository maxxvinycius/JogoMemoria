<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jogo da memória</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="titulo">Jogo da Memória</h1>
    <br>
    <header>
        <nav class="nav-menu">
            <a href="#inicio">Início</a>
            <a href="#ranking">Ranking</a>
            <a href="#sobre">Sobre</a>
        </nav>
    </header>
    <div class="buttons">


  <button id="startBtn">INICIAR</button>


  <button id="resetBtn">RESETAR</button>


</div>
<div class="card">
    <div id="inicio">
  <div class="btn green" data-color="green"></div>
  <div class="btn red" data-color="red"></div>
  <div class="btn yellow" data-color="yellow"></div>
  <div class="btn blue" data-color="blue"></div>
</div>
</div>


<div class="hud">


  <div id="ranking">🏆 PLACAR</div>


  <div class="hud-box">

</div>

<div id="sobre">
    <p>Bem-vindo ao Jogo da Memória! O objetivo é testar sua memória. cada cor irá piscar e você deverá lembrar a sequência.</p>
</div>



   
</body>
<script src="./script.js"></script>
